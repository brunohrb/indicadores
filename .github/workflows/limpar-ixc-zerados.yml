name: 🧹 Limpar dados IXC zerados

on:
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mês a limpar (YYYY-MM), ex: 2026-03'
        required: true
        default: '2026-03'

jobs:
  limpar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install @supabase/supabase-js

      - name: Limpar chaves zeradas do Supabase
        env:
          MES: ${{ github.event.inputs.mes }}
          SB_URL: 'https://xuwwgprchhfshrqdhuqn.supabase.co'
          SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1d3dncHJjaGhmc2hycWRodXFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NTI0NTQsImV4cCI6MjA4MjUyODQ1NH0.MEUMQ4_z1R5tF3_wQbEj_eTitGJia03b0M0LT3aOAnc'
        run: |
          node - <<'EOF'
          const { createClient } = require('@supabase/supabase-js');
          const sb = createClient(process.env.SB_URL, process.env.SB_KEY);
          const anoMes = process.env.MES;
          const tipos = ['receitas', 'despesas', 'fluxo', 'comercial'];

          function eZerado(obj) {
            if (!obj || typeof obj !== 'object') return true;
            const nums = Object.values(obj).filter(v => typeof v === 'number');
            return nums.length > 0 && nums.every(v => v === 0);
          }

          async function main() {
            console.log(`\n🔍 Verificando dados de ${anoMes}...\n`);
            let removidas = 0;

            // Lista tudo antes
            const { data: tudo } = await sb.from('app_storage')
              .select('key, value, updated_at')
              .like('key', 'ixc_%')
              .order('updated_at', { ascending: false });

            console.log('📋 Estado atual de TODOS os registros IXC:');
            for (const row of (tudo || [])) {
              let v; try { v = JSON.parse(row.value); } catch { v = null; }
              const z = eZerado(v);
              const dt = new Date(row.updated_at).toLocaleString('pt-BR');
              console.log(`  ${z ? '🔴' : '🟢'} ${row.key} (${dt})`);
            }

            console.log(`\n🧹 Limpando chaves zeradas de ${anoMes}...`);
            for (const tipo of tipos) {
              const chave = `ixc_${tipo}_${anoMes}`;
              const { data } = await sb.from('app_storage').select('value').eq('key', chave).maybeSingle();
              if (!data) { console.log(`  ⏭️  ${chave} — não existe`); continue; }

              let valor; try { valor = JSON.parse(data.value); } catch { valor = null; }

              if (eZerado(valor)) {
                const { error } = await sb.from('app_storage').delete().eq('key', chave);
                if (error) { console.log(`  ❌ ${chave} — erro: ${error.message}`); }
                else { console.log(`  ✅ ${chave} — REMOVIDO`); removidas++; }
              } else {
                console.log(`  ✔️  ${chave} — tem dados reais, mantido`);
              }
            }

            // Atualiza ixc_ultima_sync
            const { data: syncRow } = await sb.from('app_storage').select('value').eq('key', 'ixc_ultima_sync').maybeSingle();
            if (syncRow) {
              try {
                const sync = JSON.parse(syncRow.value);
                const meses = (sync.meses || []).filter(m => m !== anoMes);
                if (meses.length !== (sync.meses || []).length) {
                  await sb.from('app_storage').upsert(
                    { key: 'ixc_ultima_sync', value: JSON.stringify({ ...sync, meses }), updated_at: new Date().toISOString() },
                    { onConflict: 'key' }
                  );
                  console.log(`  ✅ ixc_ultima_sync — mês ${anoMes} removido da lista`);
                }
              } catch(e) { console.log('  ⚠️  Erro ao atualizar ixc_ultima_sync:', e.message); }
            }

            console.log(`\n✅ ${removidas} chave(s) removida(s).`);
            if (removidas > 0) {
              console.log(`\n💡 O dashboard agora mostrará "Sem dados" para ${anoMes}.`);
              console.log(`   Rode o sync novamente com dados reais para repopular.`);
            }
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
