name: WhatsApp — Relatório Diário

on:
  workflow_dispatch:
    inputs:
      mes:
        description: 'Mês do relatório (YYYY-MM). Vazio = mês atual.'
        required: false
        default: ''
  schedule:
    # 08h BRT = 11h UTC (dias úteis: seg a sex)
    - cron: '0 11 * * 1-5'

jobs:
  relatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar relatório diário via WhatsApp
        env:
          SB_URL: https://xuwwgprchhfshrqdhuqn.supabase.co
          WHATSAPP_WEBHOOK_SECRET: ${{ secrets.WHATSAPP_WEBHOOK_SECRET }}
          MES: ${{ github.event.inputs.mes }}
        run: |
          BODY="{}"
          if [ -n "$MES" ]; then
            BODY="{\"mes\":\"$MES\"}"
          fi
          curl -s -X POST "$SB_URL/functions/v1/whatsapp-relatorio" \
            -H "x-webhook-secret: $WHATSAPP_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$BODY"
