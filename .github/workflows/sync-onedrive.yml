name: Sync OneDrive (Fluxo de Caixa) → Supabase

on:
  workflow_dispatch:
  schedule:
    # BRT = UTC-3. Roda 07,09,11,13,15,17,19,21 BRT = 10,12,14,16,18,20,22,00 UTC
    - cron: '0 0,10,12,14,16,18,20,22 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
